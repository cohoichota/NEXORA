global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: local

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # NestJS services (each exposes /metrics via prom-client)
  - job_name: "auth-service"
    static_configs:
      - targets: ["host.docker.internal:3001"]
    metrics_path: /metrics

  - job_name: "product-service"
    static_configs:
      - targets: ["host.docker.internal:3002"]
    metrics_path: /metrics

  - job_name: "order-service"
    static_configs:
      - targets: ["host.docker.internal:3005"]
    metrics_path: /metrics

  - job_name: "payment-service"
    static_configs:
      - targets: ["host.docker.internal:3006"]
    metrics_path: /metrics

  - job_name: "api-gateway"
    static_configs:
      - targets: ["host.docker.internal:4000"]
    metrics_path: /metrics

  # PostgreSQL exporter (optional, add postgres-exporter container)
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # Redis exporter (optional, add redis-exporter container)
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
