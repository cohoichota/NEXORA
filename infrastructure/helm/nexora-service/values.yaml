replicaCount: 1

image:
  repository: ghcr.io/nexora/service-name
  pullPolicy: IfNotPresent
  tag: 'latest'

service:
  type: ClusterIP
  port: 80

env: {}
# env:
#   NODE_ENV: production
#   PORT: "3000"

secrets: {}
# secrets:
#   DATABASE_URL: "postgres://user:pass@host:5432/db"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

probes:
  enabled: true
  liveness:
    path: /health
  readiness:
    path: /health/ready

ingress:
  enabled: false
  className: 'nginx'
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
