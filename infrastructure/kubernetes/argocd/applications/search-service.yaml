apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: search-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/nexora-ecommerce
    targetRevision: HEAD
    path: infrastructure/helm/nexora-service
    helm:
      values: |
        image:
          repository: ghcr.io/nexora/search-service
          tag: latest
        service:
          port: 3008
        env:
          PORT: "3008"
          KAFKA_BROKERS: "kafka.nexora-infra.svc.cluster.local:9092"
          OPENSEARCH_NODE: "http://opensearch.nexora-infra.svc.cluster.local:9200"
  destination:
    server: https://kubernetes.default.svc
    namespace: nexora-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
