apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/nexora-ecommerce
    targetRevision: HEAD
    path: infrastructure/helm/nexora-service
    helm:
      values: |
        image:
          repository: ghcr.io/nexora/auth-service
          tag: latest
        service:
          port: 3001
        env:
          PORT: "3001"
        secrets:
          DATABASE_URL: "postgresql://postgres:postgres@postgres.nexora-infra.svc.cluster.local:5432/nexora_auth"
          JWT_SECRET: "your-super-secret-jwt-key"
  destination:
    server: https://kubernetes.default.svc
    namespace: nexora-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
