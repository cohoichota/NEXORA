apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notification-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/nexora-ecommerce
    targetRevision: HEAD
    path: infrastructure/helm/nexora-service
    helm:
      values: |
        image:
          repository: ghcr.io/nexora/notification-service
          tag: latest
        service:
          port: 3007
        env:
          PORT: "3007"
          KAFKA_BROKERS: "kafka.nexora-infra.svc.cluster.local:9092"
        secrets:
          JWT_SECRET: "your-super-secret-jwt-key"
  destination:
    server: https://kubernetes.default.svc
    namespace: nexora-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
