# docker-compose.prod.yml
# Nexora — Production environment
# Optimized images, no exposed DB ports, TLS via NGINX
# Usage: IMAGE_TAG=${GIT_SHA} docker compose -f docker/prod/docker-compose.prod.yml up -d


networks:
  nexora-prod:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:
  opensearch_prod_data:
  kafka_prod_data:
  zookeeper_prod_data:
  prometheus_prod_data:
  grafana_prod_data:
  loki_prod_data:
  nginx_certs:

services:

  # ─────────────────────────────────────────────
  # DATABASES (no exposed ports)
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: nexora-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ../shared/init-scripts/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - nexora-prod
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexora-redis-prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redis_prod_data:/data
    networks:
      - nexora-prod
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nexora-minio-prod
    restart: always
    command: server /data   # No console in production
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_prod_data:/data
    networks:
      - nexora-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      retries: 3

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nexora-zookeeper-prod
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_prod_data:/var/lib/zookeeper/data
    networks:
      - nexora-prod

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexora-kafka-prod
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_prod_data:/var/lib/kafka/data
    networks:
      - nexora-prod

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: nexora-schema-registry-prod
    restart: always
    depends_on:
      - kafka
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - nexora-prod

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: nexora-opensearch-prod
    restart: always
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
      - plugins.security.ssl.http.enabled=false
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch_prod_data:/usr/share/opensearch/data
    networks:
      - nexora-prod
    deploy:
      resources:
        limits:
          memory: 1G

  # ─────────────────────────────────────────────
  # MICROSERVICES (production builds)
  # ─────────────────────────────────────────────

  auth-service:
    image: ghcr.io/yourorg/nexora-auth-service:${IMAGE_TAG:-latest}
    container_name: nexora-auth-prod
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora-prod
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  product-service:
    image: ghcr.io/yourorg/nexora-product-service:${IMAGE_TAG:-latest}
    container_name: nexora-product-prod
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: 3002
    networks:
      - nexora-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      retries: 3

  # (other services follow same pattern)
  # inventory-service, cart-service, order-service,
  # payment-service, notification-service, search-service,
  # recommendation-service, analytics-service

  api-gateway:
    image: ghcr.io/yourorg/nexora-api-gateway:${IMAGE_TAG:-latest}
    container_name: nexora-gateway-prod
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: 4000
    networks:
      - nexora-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      retries: 3

  storefront:
    image: ghcr.io/yourorg/nexora-storefront:${IMAGE_TAG:-latest}
    container_name: nexora-storefront-prod
    restart: always
    environment:
      NODE_ENV: production
    networks:
      - nexora-prod

  # ─────────────────────────────────────────────
  # NGINX — Single entry point (port 80/443)
  # ─────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: nexora-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - storefront
      - api-gateway
    networks:
      - nexora-prod

  # ─────────────────────────────────────────────
  # OBSERVABILITY — Full stack
  # ─────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: nexora-prometheus-prod
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ../../infrastructure/monitoring/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_prod_data:/prometheus
    networks:
      - nexora-prod

  grafana:
    image: grafana/grafana:latest
    container_name: nexora-grafana-prod
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ../../infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - nexora-prod

  loki:
    image: grafana/loki:latest
    container_name: nexora-loki-prod
    restart: always
    volumes:
      - ../../infrastructure/monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_prod_data:/loki
    networks:
      - nexora-prod

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: nexora-jaeger-prod
    restart: always
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - nexora-prod
