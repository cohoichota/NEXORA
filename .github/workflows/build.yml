name: Build & Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  ORG: ${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - product-service
          - inventory-service
          - cart-service
          - order-service
          - payment-service
          - notification-service
          - search-service
          - recommendation-service
          - analytics-service
          - api-gateway
          - storefront
      fail-fast: false

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get service context
        id: ctx
        run: |
          if [[ "${{ matrix.service }}" == "storefront" || "${{ matrix.service }}" == "api-gateway" || "${{ matrix.service }}" == "admin-dashboard" || "${{ matrix.service }}" == "seller-dashboard" ]]; then
            echo "context=apps/${{ matrix.service }}" >> $GITHUB_OUTPUT
          else
            echo "context=services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.ctx.outputs.context }}/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/nexora-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/nexora-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
